<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Gymify — Progressive Overload</title>

  <!-- Favicons -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
  <link rel="icon" href="/favicon-16.png" type="image/png" sizes="16x16" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ff4d00" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gymify" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="description" content="Track workouts, log sets & reps, and crush progressive overload." />

  <!-- Chart.js (external, cached by SW) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- ===== Rest Timer Overlay ===== -->
  <div id="rest-timer-overlay" class="hidden">
    <div class="rest-timer-card">
      <div class="rest-timer-label">REST</div>
      <div id="rest-timer-display" class="rest-timer-digits">1:30</div>
      <div class="rest-timer-bar-wrap">
        <div id="rest-timer-bar" class="rest-timer-bar"></div>
      </div>
      <div class="rest-timer-controls">
        <button id="rest-skip-btn" class="btn btn-ghost">Skip</button>
        <button id="rest-restart-btn" class="btn btn-secondary">↺ Restart</button>
      </div>
      <select id="rest-duration-select" class="input" style="margin-top:.75rem">
        <option value="30">30 sec</option>
        <option value="60">1 min</option>
        <option value="90" selected>1 min 30</option>
        <option value="120">2 min</option>
        <option value="180">3 min</option>
      </select>
    </div>
  </div>

  <!-- ===== App Shell ===== -->
  <div id="app">

    <!-- Header -->
    <header class="app-header">
      <div class="header-logo">
        <img src="logo.png" alt="Gymify" class="logo-img" />
        <span class="logo-text">Gymify</span>
      </div>
      <div id="header-streak" class="header-streak"></div>
    </header>

    <!-- Main -->
    <main id="main-content">

      <!-- Dashboard -->
      <section id="view-dashboard" class="view active">
        <div class="view-header">
          <div>
            <h1>Dashboard</h1>
            <div id="current-date" class="subtitle"></div>
          </div>
        </div>
        <div id="dashboard-stats" class="stats-grid"></div>
        <div class="quick-actions">
          <button id="quick-start-btn" class="btn btn-primary btn-large">
            <span class="btn-icon-lg">▶</span> Start Workout
          </button>
        </div>
        <div class="section-title">Recent Workouts</div>
        <div id="recent-workouts" class="recent-list"></div>
      </section>

      <!-- Routines -->
      <section id="view-routines" class="view">
        <div class="view-header">
          <h1>Routines</h1>
          <button id="create-routine-btn" class="btn btn-primary btn-sm">+ New</button>
        </div>
        <div id="routines-list"></div>
      </section>

      <!-- Workout -->
      <section id="view-workout" class="view">
        <div class="view-header">
          <h1 id="workout-title">Active Workout</h1>
          <div class="workout-header-actions">
            <div id="workout-timer-display" class="workout-timer">00:00</div>
            <button id="finish-workout-btn" class="btn btn-success btn-sm">Done</button>
            <button id="cancel-workout-btn" class="btn btn-ghost btn-sm">✕</button>
          </div>
        </div>
        <div id="workout-exercises"></div>
        <div id="workout-empty" class="empty-state hidden">
          <div class="empty-icon">💪</div>
          <p>No routine selected.<br>Go to <strong>Routines</strong> to start a workout.</p>
        </div>
      </section>

      <!-- Progress -->
      <section id="view-progress" class="view">
        <div class="view-header"><h1>Progress</h1></div>

        <div class="progress-filters">
          <select id="progress-exercise-select" class="input">
            <option value="">Select Exercise</option>
          </select>
          <select id="progress-metric-select" class="input">
            <option value="maxWeight">Max Weight</option>
            <option value="volume">Volume</option>
          </select>
        </div>
        <div id="progress-summary" class="progress-summary hidden"></div>
        <div class="chart-container">
          <canvas id="progress-chart"></canvas>
        </div>

        <div class="section-title" style="margin-top:1.75rem">Week-over-Week Overload</div>
        <div class="progress-filters">
          <select id="overload-exercise-select" class="input">
            <option value="">Select Exercise</option>
          </select>
        </div>
        <div class="chart-container">
          <canvas id="overload-chart"></canvas>
        </div>
      </section>

      <!-- History -->
      <section id="view-history" class="view">
        <div class="view-header"><h1>History</h1></div>
        <div id="history-list" class="history-list"></div>
      </section>

    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="dashboard">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-btn" data-view="routines">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Routines</span>
      </button>
      <button class="nav-btn nav-btn-center" data-view="workout">
        <span class="nav-icon-center">💪</span>
      </button>
      <button class="nav-btn" data-view="progress">
        <span class="nav-icon">📈</span>
        <span class="nav-label">Progress</span>
      </button>
      <button class="nav-btn" data-view="history">
        <span class="nav-icon">📅</span>
        <span class="nav-label">History</span>
      </button>
    </nav>

  </div><!-- #app -->

  <!-- ===== Modals ===== -->
  <div id="modal-overlay" class="modal-overlay hidden">

    <!-- Create / Edit Routine -->
    <div id="modal-routine" class="modal hidden">
      <div class="modal-header">
        <h2 id="modal-routine-title">Create Routine</h2>
        <button class="modal-close" data-modal="modal-routine">✕</button>
      </div>
      <div class="modal-body">
        <input type="text" id="routine-name-input" class="input" placeholder="Routine name (e.g. Push Day)" />
        <div class="section-title" style="margin-top:1.25rem">Exercises by Muscle</div>
        <div id="muscle-tabs" class="muscle-group-tabs"></div>
        <div id="exercise-selector" class="exercise-selector"></div>
        <div class="section-title" style="margin-top:1rem">Selected</div>
        <div id="selected-exercises-list" class="selected-list"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-modal="modal-routine">Cancel</button>
        <button id="save-routine-btn" class="btn btn-primary">Save Routine</button>
      </div>
    </div>

    <!-- Select Routine -->
    <div id="modal-select-routine" class="modal hidden">
      <div class="modal-header">
        <h2>Select Routine</h2>
        <button class="modal-close" data-modal="modal-select-routine">✕</button>
      </div>
      <div class="modal-body">
        <div id="select-routine-list"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-modal="modal-select-routine">Cancel</button>
      </div>
    </div>

  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
